services:
  - type: web
    name: emotionsense-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DEBUG
        value: false
      - key: DATABASE_NAME
        value: emotionsense
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MONGODB_URL
        sync: false
